# myfi runtime configuration template.
#
# Copy this to .claude/myfi.toml at your project root and edit as needed:
#   mkdir -p .claude
#   cp examples/minimal/myfi.toml .claude/myfi.toml
#
# No section is required. Every key below already has a working default, an
# empty or missing .claude/myfi.toml still runs. Parsed by myfi_toolkit.config
# (services/toolkit/myfi_toolkit/config.py) -- for every key, precedence is
# explicit arg > env var (where one exists, noted below) > this file's value >
# the hardcoded default. See docs/configuration.md for the full schema.

[toolkit]
# Per-project SQLite registry (git-ignored). Created lazily by the first
# `bin/myfi-toolkit db init` (or the MCP db_init tool) call. No env override.
db = ".myfi/myfi.db"
# Optional second registry shared across projects, used only with --global.
# Leave commented to stay project-local. No env override.
# global_db = "~/.myfi/global.db"

[llm]
# Every model call in this plugin routes through services/llm to your LOCAL
# Claude Code (`claude -p`), never a hosted inference API. `model` is the
# alias services/llm requests when a caller does not pass --model directly.
# Env override: MYFI_LLM_MODEL (wins over this file).
model = "claude-opus-4-8"

[marketdata]
# Default degrades to the self-contained research path, no API key needed.
# Concrete providers (finnhub, yfinance, fred) are registered behind the
# MarketDataSource contract -- `provider` picks which adapter default_source()
# constructs, but each one still raises NotImplementedError from .quote()
# until a follow-up release wires the concrete HTTP client. Env override:
# MYFI_MARKETDATA_PROVIDER (wins over this file). See docs/marketdata.md.
provider = "research"

[flock]
# The model each dispatched flock agent runs on. The shipped roster (only
# @advisor on opus, every other seat on sonnet) is baked into config.py's
# FLOCK_DEFAULT_MODELS and each agents/<name>.md frontmatter, so you do not need
# this section at all -- it is the override surface. `flock_model(agent)` resolves
# per-run arg > [flock].<agent> > [flock].default > shipped roster > sonnet. No
# env override. See docs/flock.md#model-policy.
# default  = "sonnet"   # move every seat at once (e.g. force the whole flock cheap)
# designer = "opus"     # move one seat
